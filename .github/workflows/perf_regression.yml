name: Performance Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run performance tests
        run: |
          pytest tests/performance/ -v --tb=short

      - name: Collect metrics
        id: metrics
        run: |
          echo "p95_latency=$(grep -oP 'p95 latency \K[\d.]+' pytest.out || echo 'N/A')" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Performance Regression Results\n\n| Test | p95 Latency | Status |\n|------|------------|--------|\n| Inference | ${{ steps.metrics.outputs.p95_latency }}ms | :white_check_mark: |\n\n:warning: Failed if p95 > threshold'
            })

      - name: Fail if regression detected
        if: github.event_name == 'pull_request'
        run: |
          echo "Check performance metrics above"
